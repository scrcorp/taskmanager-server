name: Deploy to Staging

on:
  push:
    branches: [staging]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - '.github/**'
      - '.gitignore'
      - 'LICENSE'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/taskmanager-server-staging
            git pull origin staging

            # 컨테이너 빌드
            docker compose -f docker-compose.staging.yml build

            # prod DB → staging DB 복사 (GitHub Secrets 사용)
            docker compose -f docker-compose.staging.yml run --rm \
              -e PGPASSWORD='${{ secrets.RDS_PASSWORD }}' \
              api sh -c 'pg_dump -h ${{ secrets.RDS_HOST }} -U ${{ secrets.RDS_USER }} -d postgres --clean --if-exists | psql -h ${{ secrets.RDS_HOST }} -U ${{ secrets.RDS_USER }} -d taskmanager_staging'

            # 서버 시작
            docker compose -f docker-compose.staging.yml down
            docker compose -f docker-compose.staging.yml up -d
